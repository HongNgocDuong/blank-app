[theme]
primaryColor = "#4C78A8"
backgroundColor = "#F8F9FB"
secondaryBackgroundColor = "#E3F2FD"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "developer"

[logger]
level = "info"

[server]
headless = true
runOnSave = true
maxUploadSize = 200

[browser]
gatherUsageStats = false
